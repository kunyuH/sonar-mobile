        /* 客户端标识输入页 */
        .client-page {
            height: 100%;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .client-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .client-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .client-close-btn {
            color: #ff4d4f;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            background: linear-gradient(135deg, #fff1f0, #fff);
            border: 1px solid #ffa39e;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .client-close-btn:hover {
            background: linear-gradient(135deg, #ffccc7, #fff1f0);
            transform: scale(1.05);
        }
        .client-close-btn::after {
            content: "关闭";
            font-size: 11px;
            color: #ff4d4f;
            font-weight: 500;
        }
        .client-title {
            font-size: 18px;
            font-weight: 500;
            color: #333;
        }
        .client-input {
            margin-bottom: 20px;
        }
        .client-input-wrapper {
            position: relative;
        }
        .client-input-wrapper .layui-input {
            padding-right: 50px;
        }
        .client-eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
            cursor: pointer;
        }
        .client-btn {
            width: 100%;
            height: 45px;
            font-size: 16px;
            border-radius: 22px;
        }
        /* 主功能页 */
        .main-page {
            display: none;
            height: 100%;
        }
        .main-page.show {
            display: block;
        }
        /* 顶部栏 - fixed定位 */
        .header {
            background: #1E9FFF;
            padding: 0 15px;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }

            width: auto;
            min-width: 60px;
        }
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #fff;
        }
        .header-btn {
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

            padding: 6px 12px;

        .header-btn.close-btn::after {
            content: "关闭";
            font-size: 11px;
            margin-left: 0;
            font-weight: 500;
        }
        /* tab容器 - padding-top，overflow: scroll */

            top: 50px;
            left: 0;
            right: 0;
            z-index: 99;

</head>

    <script>
        let ascript_obj = airscript
        let layer, element, form
        let countdownTimer = null  // 客户端标识页面倒计时
        let countdownValue = 180;  // 3分钟

        // 更新倒计时显示
        function updateCountdownDisplay() {
            let $num = $('#countdownNum');
            $num.text(countdownValue);
            if (countdownValue <= 10) {
                $num.addClass('urgent');
            } else {
                $num.removeClass('urgent');
            }
        }

        // 启动倒计时
        function startClientPageTimeout() {
            stopClientPageTimeout();
            countdownValue = 180;
            updateCountdownDisplay();

            countdownTimer = setInterval(function() {
                countdownValue--;
                updateCountdownDisplay();
                if (countdownValue <= 0) {
                    stopClientPageTimeout();
                    ascript_obj.call("close", "");
                    ascript_obj.close();
                }
            }, 1000);
        }

        // 停止倒计时
        function stopClientPageTimeout() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        layui.use(['element', 'layer', 'form'], function(){
            element = layui.element;
            layer = layui.layer;
            form = layui.form;

            function data_init(){
               var super_key = ascript_obj.get("super_key");
               if(super_key && super_key.length > 0){
                   $('#super_key').val(super_key)
               }
               var device_name = ascript_obj.get("device_name");
               if(device_name && device_name.length > 0){
                   $('#device_name').val(device_name)
               }

               // 加载抖音留痕表单状态
               var formDataStr = ascript_obj.get("dyFootprintForm");
               if(formDataStr && formDataStr.length > 0){
                   try{
                       var formData = JSON.parse(formDataStr);
                       if(formData.closeApp !== undefined){
                           if(formData.closeApp){
                               $('#closeAppYes').addClass('checked');
                               $('#closeAppNo').removeClass('checked');
                           }else{
                               $('#closeAppNo').addClass('checked');
                               $('#closeAppYes').removeClass('checked');
                           }
                       }
                       // 复选框状态
                       if(formData.follow !== undefined && formData.follow){
                           $('#checkboxFollow').addClass('checked');
                       }
                       if(formData.privateMsg !== undefined && formData.privateMsg){
                           $('#checkboxPrivateMsg').addClass('checked');
                       }
                       if(formData.homeLike !== undefined && formData.homeLike){
                           $('#checkboxHomeLike').addClass('checked');
                       }
                       if(formData.homeCollect !== undefined && formData.homeCollect){
                           $('#checkboxHomeCollect').addClass('checked');
                       }
                       if(formData.homeComment !== undefined && formData.homeComment){
                           $('#checkboxHomeComment').addClass('checked');
                       }
                       // 数值输入
                       if(formData.followCount !== undefined){
                           $('#followCount').val(formData.followCount);
                       }
                       if(formData.followRate !== undefined){
                           $('#followRate').val(formData.followRate);
                       }
                       if(formData.privateMsgCount !== undefined){
                           $('#privateMsgCount').val(formData.privateMsgCount);
                       }
                       if(formData.privateMsgRate !== undefined){
                           $('#privateMsgRate').val(formData.privateMsgRate);
                       }
                       if(formData.homeLikeCount !== undefined){
                           $('#homeLikeCount').val(formData.homeLikeCount);
                       }
                       if(formData.homeLikeRate !== undefined){
                           $('#homeLikeRate').val(formData.homeLikeRate);
                       }
                       if(formData.homeCollectCount !== undefined){
                           $('#homeCollectCount').val(formData.homeCollectCount);
                       }
                       if(formData.homeCollectRate !== undefined){
                           $('#homeCollectRate').val(formData.homeCollectRate);
                       }
                       if(formData.homeCommentCount !== undefined){
                           $('#homeCommentCount').val(formData.homeCommentCount);
                       }
                       if(formData.homeCommentRate !== undefined){
                           $('#homeCommentRate').val(formData.homeCommentRate);
                       }
                       // 间隔时间
                       if(formData.intervalMin !== undefined){
                           $('#intervalMin').val(formData.intervalMin);
                       }
                       if(formData.intervalMax !== undefined){
                           $('#intervalMax').val(formData.intervalMax);
                       }
                       // 话术
                       if(formData.privateMsgScript !== undefined){
                           $('#privateMsgScript').val(formData.privateMsgScript);
                       }
                       if(formData.homeVideoCommentScript !== undefined){
                           $('#homeVideoCommentScript').val(formData.homeVideoCommentScript);
                       }
                   }catch(e){
                       console.error('加载表单状态失败', e);
                   }
               }

               // 加载帖子留痕表单状态
               var postFormDataStr = ascript_obj.get("dyPostFootprintForm");
               if(postFormDataStr && postFormDataStr.length > 0){
                   try{
                       var postFormData = JSON.parse(postFormDataStr);
                       if(postFormData.closeApp !== undefined){
                           if(postFormData.closeApp){
                               $('#postCloseAppYes').addClass('checked');
                               $('#postCloseAppNo').removeClass('checked');
                           }else{
                               $('#postCloseAppNo').addClass('checked');
                               $('#postCloseAppYes').removeClass('checked');
                           }
                       }
                       if(postFormData.textComment !== undefined && postFormData.textComment){
                           $('#postCheckboxTextComment').addClass('checked');
                       }
                       if(postFormData.emojiComment !== undefined && postFormData.emojiComment){
                           $('#postCheckboxEmojiComment').addClass('checked');
                       }
                       if(postFormData.textCommentCount !== undefined){
                           $('#postTextCommentCount').val(postFormData.textCommentCount);
                       }
                       if(postFormData.textCommentRate !== undefined){
                           $('#postTextCommentRate').val(postFormData.textCommentRate);
                       }
                       if(postFormData.emojiCommentCount !== undefined){
                           $('#postEmojiCommentCount').val(postFormData.emojiCommentCount);
                       }
                       if(postFormData.emojiCommentRate !== undefined){
                           $('#postEmojiCommentRate').val(postFormData.emojiCommentRate);
                       }
                       if(postFormData.intervalMin !== undefined){
                           $('#postIntervalMin').val(postFormData.intervalMin);
                       }
                       if(postFormData.intervalMax !== undefined){
                           $('#postIntervalMax').val(postFormData.intervalMax);
                       }
                       if(postFormData.commentScript !== undefined){
                           $('#postCommentScript').val(postFormData.commentScript);
                       }
                   }catch(e){
                       console.error('加载帖子留痕表单状态失败', e);
                   }
               }
            }
            data_init()

            // 页面加载时启动超时计时器
            startClientPageTimeout();

            // 保存表单状态
            function saveFormState(){
                var formData = {
                    closeApp: $('#closeAppYes').hasClass('checked'),
                    follow: $('#checkboxFollow').hasClass('checked'),
                    followCount: $('#followCount').val(),
                    followRate: $('#followRate').val(),
                    privateMsg: $('#checkboxPrivateMsg').hasClass('checked'),
                    privateMsgCount: $('#privateMsgCount').val(),
                    privateMsgRate: $('#privateMsgRate').val(),
                    homeLike: $('#checkboxHomeLike').hasClass('checked'),
                    homeLikeCount: $('#homeLikeCount').val(),
                    homeLikeRate: $('#homeLikeRate').val(),
                    homeCollect: $('#checkboxHomeCollect').hasClass('checked'),
                    homeCollectCount: $('#homeCollectCount').val(),
                    homeCollectRate: $('#homeCollectRate').val(),
                    homeComment: $('#checkboxHomeComment').hasClass('checked'),
                    homeCommentCount: $('#homeCommentCount').val(),
                    homeCommentRate: $('#homeCommentRate').val(),
                    intervalMin: $('#intervalMin').val(),
                    intervalMax: $('#intervalMax').val(),
                    privateMsgScript: $('#privateMsgScript').val(),
                    homeVideoCommentScript: $('#homeVideoCommentScript').val()
                };
                ascript_obj.save("dyFootprintForm", JSON.stringify(formData));
            }

            // 单选按钮点击 - 任务结束关闭App
            $('#closeAppYes, #closeAppNo').on('click', function(){
                if($(this).attr('id') === 'closeAppYes'){
                    $('#closeAppYes').addClass('checked');
                    $('#closeAppNo').removeClass('checked');
                }else{
                    $('#closeAppNo').addClass('checked');
                    $('#closeAppYes').removeClass('checked');
                }
                saveFormState();
            });

            // 单选按钮点击 - 帖子留痕任务结束关闭App
            $('#postCloseAppYes, #postCloseAppNo').on('click', function(){
                if($(this).attr('id') === 'postCloseAppYes'){
                    $('#postCloseAppYes').addClass('checked');
                    $('#postCloseAppNo').removeClass('checked');
                }else{
                    $('#postCloseAppNo').addClass('checked');
                    $('#postCloseAppYes').removeClass('checked');
                }
                savePostFormState();
            });

            // 复选框点击
            $('.task-checkbox-box').on('click', function(){
                $(this).toggleClass('checked');
                saveFormState();
                savePostFormState();
            });

            // 所有输入框监听
            $('.task-input-num, .task-interval-input, .task-textarea').on('input', function(){
                saveFormState();
                savePostFormState();
            });

            // 保存帖子留痕表单状态
            function savePostFormState(){
                var formData = {
                    closeApp: $('#postCloseAppYes').hasClass('checked'),
                    textComment: $('#postCheckboxTextComment').hasClass('checked'),
                    textCommentCount: $('#postTextCommentCount').val(),
                    textCommentRate: $('#postTextCommentRate').val(),
                    emojiComment: $('#postCheckboxEmojiComment').hasClass('checked'),
                    emojiCommentCount: $('#postEmojiCommentCount').val(),
                    emojiCommentRate: $('#postEmojiCommentRate').val(),
                    intervalMin: $('#postIntervalMin').val(),
                    intervalMax: $('#postIntervalMax').val(),
                    commentScript: $('#postCommentScript').val()
                };
                ascript_obj.save("dyPostFootprintForm", JSON.stringify(formData));
            }

            // 监听输入框活动，重置超时
            $('#super_key').on('input keypress focus', function() {
                startClientPageTimeout();
            });

            // 进入按钮点击
            $('#enterBtn').on('click', function(){
                var super_key = $('#super_key').val().trim();
                if(!super_key){
                    layer.msg('请输入客户端标识');
                    return;
                }
                var device_name = $('#device_name').val().trim();
                if(!device_name){
                    device_name = '设备' + Math.random().toString(36).slice(2, 7).toUpperCase();
                }
                ascript_obj.save("super_key", super_key);
                ascript_obj.save("device_name", device_name);
                layer.load(2, {shade: [0.3, '#000']});
                ascript_obj.call("check_key", JSON.stringify({key: super_key, device_name: device_name}))
            });

            // 退出按钮
            $('#logoutBtn').on('click', function(){
                $('#mainPage').removeClass('show');
                $('#clientPage').show();
                var super_key = ascript_obj.get("super_key");
                if(super_key && super_key.length > 0){
                    $('#super_key').val(super_key)
                }
                var device_name = ascript_obj.get("device_name");
                if(device_name && device_name.length > 0){
                    $('#device_name').val(device_name)
                }
                startClientPageTimeout();
            });

            // 关闭按钮（主页面）
            $('#closeBtn').on('click', function(){
                ascript_obj.call("close", "")
                ascript_obj.close();
            });

            // 关闭按钮（客户端标识页）
            $('#clientCloseBtn').on('click', function(){
                ascript_obj.call("close", "")
                ascript_obj.close();
            });

            // 说明按钮
            $('#helpBtn').on('click', function(){
                layer.open({
                    title: '功能说明',
                    content: '<div style="padding:10px;line-height:2;">' +
                        '<p><strong>关注：</strong>关注用户</p>' +
                        '<p><strong>私信：</strong>私信用户</p>' +
                        '<p><strong>主页赞：</strong>主页给第一个视频点赞</p>' +
                        '<p><strong>主页藏：</strong>主页给第一个视频收藏</p>' +
                        '<p><strong>主页评：</strong>主页给第一个视频评论</p>' +
                        '<hr style="margin:10px 0;border:none;border-top:1px solid #eee;">' +
                        '<p><strong>次数和百分比含义：</strong></p>' +
                        '<p style="padding-left:1em;">例如 关注 100次 20%</p>' +
                        '<p style="padding-left:2em;">指的是20%概率进行关注，关注100次后不再关注</p>' +
                        '<p style="color:#ff6b6b;margin-top:10px;"><strong>防止风控</strong></p>' +
                        '</div>',
                    area: ['320px', '420px'],
                    btn: ['知道了']
                });
            });

            // 帖子留痕说明按钮
            $('#postHelpBtn').on('click', function(){
                layer.open({
                    title: '功能说明',
                    content: '<div style="padding:10px;line-height:2;">' +
                        '<p><strong>文字评论：</strong>对帖子发送文字评论</p>' +
                        '<p><strong>表情图评论：</strong>对帖子发送表情图评论</p>' +
                        '<hr style="margin:10px 0;border:none;border-top:1px solid #eee;">' +
                        '<p><strong>次数和百分比含义：</strong></p>' +
                        '<p style="padding-left:1em;">例如 文字评论 100次 80%</p>' +
                        '<p style="padding-left:2em;">指的是80%概率进行文字评论，评论100次后不再评论</p>' +
                        '<p style="color:#ff6b6b;margin-top:10px;"><strong>防止风控</strong></p>' +
                        '</div>',
                    area: ['320px', '380px'],
                    btn: ['知道了']
                });
            });

            // 眼睛按钮 - 切换密码显示/隐藏
            $('#eyeBtn').on('click', function(){
                var $input = $('#super_key');
                var $btn = $(this);
                if($input.attr('type') === 'password'){
                    $input.attr('type', 'text');
                    $btn.text('隐藏');
                }else{
                    $input.attr('type', 'password');
                    $btn.text('显示');
                }
            });

            // 回车进入
            $('#super_key').on('keypress', function(e){
                if(e.keyCode === 13){
                    $('#enterBtn').click();
                }
            });

            // 开始按钮
            $('#startBtn').on('click', function(){
                var formData = {
                    closeApp: $('#closeAppYes').hasClass('checked'),
                    follow: $('#checkboxFollow').hasClass('checked'),
                    followCount: $('#followCount').val(),
                    followRate: $('#followRate').val(),
                    privateMsg: $('#checkboxPrivateMsg').hasClass('checked'),
                    privateMsgCount: $('#privateMsgCount').val(),
                    privateMsgRate: $('#privateMsgRate').val(),
                    homeLike: $('#checkboxHomeLike').hasClass('checked'),
                    homeLikeCount: $('#homeLikeCount').val(),
                    homeLikeRate: $('#homeLikeRate').val(),
                    homeCollect: $('#checkboxHomeCollect').hasClass('checked'),
                    homeCollectCount: $('#homeCollectCount').val(),
                    homeCollectRate: $('#homeCollectRate').val(),
                    homeComment: $('#checkboxHomeComment').hasClass('checked'),
                    homeCommentCount: $('#homeCommentCount').val(),
                    homeCommentRate: $('#homeCommentRate').val(),
                    intervalMin: $('#intervalMin').val(),
                    intervalMax: $('#intervalMax').val(),
                    privateMsgScript: $('#privateMsgScript').val(),
                    homeVideoCommentScript: $('#homeVideoCommentScript').val()
                };

                // 构建确认信息
                var confirmMsg = '确认开始任务？<br><br>';
                var actions = [];
                if(formData.follow) actions.push('关注');
                if(formData.privateMsg) actions.push('私信');
                if(formData.homeLike) actions.push('主页赞');
                if(formData.homeCollect) actions.push('主页藏');
                if(formData.homeComment) actions.push('主页评');
                if(actions.length === 0){
                    layer.msg('请至少选择一个功能！');
                    return;
                }
                confirmMsg += '已选功能：' + actions.join('、') + '<br>';
                confirmMsg += '每轮间隔：' + (formData.intervalMin || 120) + '-' + (formData.intervalMax || 199) + '秒';

                layer.confirm(confirmMsg, {
                    title: '确认操作',
                    btn: ['开始', '取消']
                }, function(index){
                    layer.close(index);
                    ascript_obj.call("dy_start_footprint", JSON.stringify(formData));
                });
            });

            // 帖子留痕开始按钮
            $('#postStartBtn').on('click', function(){
                var formData = {
                    closeApp: $('#postCloseAppYes').hasClass('checked'),
                    textComment: $('#postCheckboxTextComment').hasClass('checked'),
                    textCommentCount: $('#postTextCommentCount').val(),
                    textCommentRate: $('#postTextCommentRate').val(),
                    emojiComment: $('#postCheckboxEmojiComment').hasClass('checked'),
                    emojiCommentCount: $('#postEmojiCommentCount').val(),
                    emojiCommentRate: $('#postEmojiCommentRate').val(),
                    intervalMin: $('#postIntervalMin').val(),
                    intervalMax: $('#postIntervalMax').val(),
                    commentScript: $('#postCommentScript').val()
                };

                var confirmMsg = '确认开始任务？<br><br>';
                var actions = [];
                if(formData.textComment) actions.push('文字评论');
                if(formData.emojiComment) actions.push('表情图评论');
                if(actions.length === 0){
                    layer.msg('请至少选择一个功能！');
                    return;
                }
                confirmMsg += '已选功能：' + actions.join('、') + '<br>';
                confirmMsg += '每轮间隔：' + (formData.intervalMin || 120) + '-' + (formData.intervalMax || 199) + '秒';

                layer.confirm(confirmMsg, {
                    title: '确认操作',
                    btn: ['开始', '取消']
                }, function(index){
                    layer.close(index);
                    ascript_obj.call("dy_start_post_footprint", JSON.stringify(formData));
                });
            });

            // 云控启动按钮
            $('#cloudStartBtn').on('click', function(){
                layer.confirm('确认启动全自动云控？', {
                    title: '确认操作',
                    btn: ['启动', '取消']
                }, function(index){
                    layer.close(index);
                    // TODO: 实现全自动云控逻辑
                    ascript_obj.call("cloud_start", JSON.stringify({}));
                });
            });
        });

        // Python调用此函数渲染权限页面
        window.renderPermissions = function(rolesStr){
            layer.closeAll();

            // 验证通过，停止倒计时
            stopClientPageTimeout();

            var roles;
            try {
                roles = typeof rolesStr === 'string' ? JSON.parse(rolesStr) : rolesStr;
            } catch(e) {
                roles = {};
            }

            var hasPermission = false;

            // tab配置：权限key -> 显示名称
            var tabConfig = [
                { id: 'dyFootprintTab',     permission: 'menu_dy_monitor_footprint', label: '抖音用户留痕' },
                { id: 'dyPostFootprintTab', permission: 'menu_dy_post_footprint',    label: '抖音帖子留痕' },
                { id: 'fullAutoCloudTab',   permission: 'menu_full_auto_cloud',      label: '全自动云控' },
            ];

            var availableTabs = tabConfig.filter(function(t) {
                return roles && roles[t.permission];
            });

            // 构建tab导航栏
            var $nav = $('#tabNav').empty();
            if (availableTabs.length > 1) {
                availableTabs.forEach(function(t, i) {
                    $nav.append(
                        $('<div class="tab-nav-item' + (i === 0 ? ' active' : '') + '">')
                            .text(t.label)
                            .on('click', function() {
                                $('.tab-nav-item').removeClass('active');
                                $(this).addClass('active');
                                $('.tab-panel').removeClass('active');
                                $('#' + t.id).addClass('active');
                            })
                    );
                });
                $nav.show();
                $('.tab-container').css('padding-top', '90px');
            } else {
                $nav.hide();
                $('.tab-container').css('padding-top', '50px');
            }

            // 显示有权限的面板，激活第一个
            $('.tab-panel').removeClass('active');
            if (availableTabs.length > 0) {
                hasPermission = true;
                $('#' + availableTabs[0].id).addClass('active');
            }

            // 如果没有任何权限，显示默认tab
            if (!hasPermission) {
                $('#defaultTab').addClass('active');
            }

            $('#clientPage').hide();
            $('#mainPage').addClass('show');
            layui.form.render();
        }

        window.showError = function(msg){
            layer.closeAll();
            layer.msg(msg || '验证失败');
        }

        // load
        window.showLoading = function(msg){
            layer.closeAll();
            layer.msg(msg || '加载中...', {
                icon: 16,
                shade: 0.01,
                time: 0 // 设置为0表示不自动关闭
            });
        }
    </script>
</body>
