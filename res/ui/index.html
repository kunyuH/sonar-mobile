<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>spider 手机脚本</title>
    <link rel="stylesheet" href="layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            background-color: #f2f2f2;
        }
        /* 客户端标识输入页 */
        .client-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .client-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .client-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .client-close-btn {
            color: #ff4d4f;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            background: linear-gradient(135deg, #fff1f0, #fff);
            border: 1px solid #ffa39e;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .client-close-btn:hover {
            background: linear-gradient(135deg, #ffccc7, #fff1f0);
            transform: scale(1.05);
        }
        .client-close-btn::after {
            content: "关闭";
            font-size: 11px;
            color: #ff4d4f;
            font-weight: 500;
        }
        .client-title {
            font-size: 18px;
            font-weight: 500;
            color: #333;
        }
        .client-input {
            margin-bottom: 20px;
        }
        .client-input-wrapper {
            position: relative;
        }
        .client-input-wrapper .layui-input {
            padding-right: 50px;
        }
        .client-eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
            cursor: pointer;
        }
        .client-btn {
            width: 100%;
            height: 45px;
            font-size: 16px;
            border-radius: 22px;
        }
        /* 主功能页 */
        .main-page {
            display: none;
            height: 100%;
        }
        .main-page.show {
            display: block;
        }
        /* 顶部栏 - fixed定位 */
        .header {
            background: #1E9FFF;
            padding: 0 15px;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }
        .header-left, .header-right {
            width: auto;
            min-width: 60px;
        }
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #fff;
        }
        .header-btn {
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .header-btn.close-btn {
            font-size: 18px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .header-btn.close-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .header-btn.close-btn::after {
            content: "关闭";
            font-size: 11px;
            margin-left: 0;
            font-weight: 500;
        }
        /* tab容器 - padding-top，overflow: scroll */
        .tab-nav {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            z-index: 99;
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
        }
        .tab-nav-item {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-nav-item.active {
            color: #1E9FFF;
            border-bottom-color: #1E9FFF;
            font-weight: bold;
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }
        .tab-container {
            padding-top: 90px;
            height: 100%;
            overflow: scroll;
            -webkit-overflow-scrolling: touch;
        }
        /* 功能卡片 */
        .module-card {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin: 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .module-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .form-item {
            margin-bottom: 15px;
        }
        .form-item:last-child {
            margin-bottom: 0;
        }
        .form-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        /* 任务设置卡片 */
        .task-settings-card {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin: 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .task-settings-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .task-form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .task-form-label {
            font-size: 14px;
            color: #333;
        }
        .task-radio-group {
            display: flex;
            gap: 15px;
        }
        .task-radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .task-radio-circle {
            width: 18px;
            height: 18px;
            border: 2px solid #d2d2d2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .task-radio-circle.checked {
            border-color: #1E9FFF;
        }
        .task-radio-circle.checked::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #1E9FFF;
            border-radius: 50%;
        }
        .task-radio-text {
            font-size: 14px;
            color: #333;
        }
        .task-checkbox-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        .task-checkbox-col {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .task-checkbox-box {
            width: 18px;
            height: 18px;
            border: 2px solid #d2d2d2;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .task-checkbox-box.checked {
            border-color: #1E9FFF;
            background: #1E9FFF;
        }
        .task-checkbox-box.checked::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }
        .task-checkbox-label {
            font-size: 14px;
            color: #333;
        }
        .task-input-num {
            width: 36px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #1E9FFF;
            color: #1E9FFF;
            font-size: 14px;
            text-align: center;
            outline: none;
        }
        .task-input-unit {
            color: #666;
            font-size: 12px;
        }
        .task-interval-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .task-interval-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-interval-input {
            width: 50px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #1E9FFF;
            color: #1E9FFF;
            font-size: 14px;
            text-align: center;
            outline: none;
        }
        .task-interval-sep {
            color: #666;
            font-size: 14px;
        }
        .task-textarea-row {
            margin-bottom: 15px;
        }
        .task-textarea-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        .task-textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #e2e2e2;
            color: #333;
            font-size: 14px;
            padding: 6px 0;
            outline: none;
        }
        .task-textarea::placeholder {
            color: #999;
        }
        .submit-btn {
            width: calc(100% - 30px);
            margin: 0 15px 30px 15px;
            height: 45px;
            font-size: 16px;
            border-radius: 22px;
        }
        .hidden {
            display: none !important;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        /* 倒计时样式 */
        .countdown-wrap {
            text-align: center;
            margin-bottom: 15px;
        }
        .countdown-inner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff0f0;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #ffccc7;
        }
        .countdown-icon {
            color: #ff4d4f;
            font-size: 18px;
        }
        .countdown-text {
            color: #666;
            font-size: 13px;
        }
        .countdown-num {
            font-size: 24px;
            font-weight: bold;
            color: #faad14;
            min-width: 40px;
            text-align: center;
        }
        .countdown-num.urgent {
            color: #ff4d4f;
            animation: pulse 0.5s infinite;
        }
    </style>
</head>

<body class="layui-bg-gray">
    <!-- 客户端标识输入页 -->
    <div id="clientPage" class="client-page">
        <div class="client-card">
            <div class="client-card-header">
                <span class="client-close-btn" id="clientCloseBtn"><i class="layui-icon layui-icon-close"></i></span>
                <div class="client-title">spider 手机脚本</div>
                <span style="width: 24px;"></span>
            </div>
            <div class="client-input">
                <div class="client-input-wrapper">
                    <input type="password" id="super_key" class="layui-input" placeholder="请输入客户端标识">
                    <span class="client-eye-btn" id="eyeBtn">显示</span>
                </div>
            </div>
            <div class="client-input">
                <input type="text" id="device_name" class="layui-input" placeholder="设备名称（不填则随机生成）">
            </div>
            <div style="background: #fffbe6; border: 1px solid #faad14; border-radius: 6px; padding: 12px 15px; margin-bottom: 20px;">
                <p style="color: #d48806; font-size: 12px; margin: 0; line-height: 1.6; text-align: center;">
                    <i class="layui-icon layui-icon-tips" style="margin-right: 5px;"></i>客户端标识请到客户端提取
                    <br>所在位置 设置-&gt;全局设置 卡密附近【我的客户端标识】
                </p>
            </div>
            <!-- 倒计时显示 -->
            <div id="countdownWrap" class="countdown-wrap">
                <div class="countdown-inner">
                    <i class="layui-icon layui-icon-time countdown-icon"></i>
                    <span class="countdown-text">请在</span>
                    <span id="countdownNum" class="countdown-num">180</span>
                    <span class="countdown-text">秒内完成操作</span>
                </div>
            </div>
            <button class="layui-btn layui-btn-normal client-btn" id="enterBtn">进入</button>
        </div>
    </div>

    <!-- 主功能页 -->
    <div id="mainPage" class="main-page">
        <!-- 顶部栏 -->
        <div class="header">
            <div class="header-left">
                <span class="header-btn close-btn" id="closeBtn"><i class="layui-icon layui-icon-close"></i></span>
            </div>
            <div class="header-title">spider 手机脚本</div>
            <div class="header-right">
                <span class="header-btn" id="logoutBtn">返回</span>
            </div>
        </div>

        <!-- tab内容区 -->
        <div class="tab-container" style="padding-top:50px;">
            <!-- 全自动云控 -->
            <div id="fullAutoCloudTab" class="tab-panel active" style="padding:15px;">
                <button type="button" class="layui-btn layui-btn-normal layui-btn-fluid" id="cloudStartBtn" style="height:45px;font-size:16px;">启动云控</button>
            </div>
        </div>
    </div>

    <script src="layui/layui.js"></script>
    <script src="js/jquery.min.js"></script>
    <script>
        let ascript_obj = airscript
        let layer, element, form
        let countdownTimer = null  // 客户端标识页面倒计时
        let countdownValue = 180;  // 3分钟

        // 更新倒计时显示
        function updateCountdownDisplay() {
            let $num = $('#countdownNum');
            $num.text(countdownValue);
            if (countdownValue <= 10) {
                $num.addClass('urgent');
            } else {
                $num.removeClass('urgent');
            }
        }

        // 启动倒计时
        function startClientPageTimeout() {
            stopClientPageTimeout();
            countdownValue = 180;
            updateCountdownDisplay();

            countdownTimer = setInterval(function() {
                countdownValue--;
                updateCountdownDisplay();
                if (countdownValue <= 0) {
                    stopClientPageTimeout();
                    ascript_obj.call("close", "");
                    ascript_obj.close();
                }
            }, 1000);
        }

        // 停止倒计时
        function stopClientPageTimeout() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        layui.use(['element', 'layer', 'form'], function(){
            element = layui.element;
            layer = layui.layer;
            form = layui.form;

            function data_init(){
               var super_key = ascript_obj.get("super_key");
               if(super_key && super_key.length > 0){
                   $('#super_key').val(super_key)
               }
               var device_name = ascript_obj.get("device_name");
               if(device_name && device_name.length > 0){
                   $('#device_name').val(device_name)
               }
            }
            data_init()

            // 页面加载时启动超时计时器
            startClientPageTimeout();

            // 监听输入框活动，重置超时
            $('#super_key').on('input keypress focus', function() {
                startClientPageTimeout();
            });

            // 进入按钮点击
            $('#enterBtn').on('click', function(){
                var super_key = $('#super_key').val().trim();
                if(!super_key){
                    layer.msg('请输入客户端标识');
                    return;
                }
                var device_name = $('#device_name').val().trim();
                if(!device_name){
                    device_name = '设备' + Math.random().toString(36).slice(2, 7).toUpperCase();
                }
                ascript_obj.save("super_key", super_key);
                ascript_obj.save("device_name", device_name);
                layer.load(2, {shade: [0.3, '#000']});
                ascript_obj.call("check_key", JSON.stringify({key: super_key, device_name: device_name}))
            });

            // 退出按钮
            $('#logoutBtn').on('click', function(){
                $('#mainPage').removeClass('show');
                $('#clientPage').show();
                var super_key = ascript_obj.get("super_key");
                if(super_key && super_key.length > 0){
                    $('#super_key').val(super_key)
                }
                var device_name = ascript_obj.get("device_name");
                if(device_name && device_name.length > 0){
                    $('#device_name').val(device_name)
                }
                startClientPageTimeout();
            });

            // 关闭按钮（主页面）
            $('#closeBtn').on('click', function(){
                ascript_obj.call("close", "")
                ascript_obj.close();
            });

            // 关闭按钮（客户端标识页）
            $('#clientCloseBtn').on('click', function(){
                ascript_obj.call("close", "")
                ascript_obj.close();
            });

            // 眼睛按钮 - 切换密码显示/隐藏
            $('#eyeBtn').on('click', function(){
                var $input = $('#super_key');
                var $btn = $(this);
                if($input.attr('type') === 'password'){
                    $input.attr('type', 'text');
                    $btn.text('隐藏');
                }else{
                    $input.attr('type', 'password');
                    $btn.text('显示');
                }
            });

            // 回车进入
            $('#super_key').on('keypress', function(e){
                if(e.keyCode === 13){
                    $('#enterBtn').click();
                }
            });

            // 云控启动按钮
            $('#cloudStartBtn').on('click', function(){
                layer.confirm('确认启动全自动云控？', {
                    title: '确认操作',
                    btn: ['启动', '取消']
                }, function(index){
                    layer.close(index);
                    // TODO: 实现全自动云控逻辑
                    ascript_obj.call("cloud_start", JSON.stringify({}));
                });
            });
        });

        // Python调用此函数进入主页面
        window.showMainPage = function(){
            layer.closeAll();
            stopClientPageTimeout();
            $('#clientPage').hide();
            $('#mainPage').addClass('show');
        }

        window.showError = function(msg){
            layer.closeAll();
            layer.msg(msg || '验证失败');
        }

        // load
        window.showLoading = function(msg){
            layer.closeAll();
            layer.msg(msg || '加载中...', {
                icon: 16,
                shade: 0.01,
                time: 0 // 设置为0表示不自动关闭
            });
        }
    </script>
</body>

</html>
